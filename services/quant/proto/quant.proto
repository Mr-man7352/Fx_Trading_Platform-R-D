// QN-004 — gRPC service definitions for the quant hot path.
// Step 1.5 ships definitions + UNIMPLEMENTED servicers; real implementations
// land in Phase 2 (Predict QN-042, SizePosition QN-043, RunPipeline QN-046).
// Message shapes are provisional until those stories — evolve fields there.
//
// Codegen: `uv run python scripts/gen_proto.py` → app/proto_gen/ (committed;
// CI drift-checks). TS stubs for Node workers arrive with BE-068 (Phase 2).

syntax = "proto3";

package fx.quant.v1;

import "google/protobuf/timestamp.proto";

service QuantService {
  // Full deterministic pipeline for one closed bar: features → regime →
  // candidate + calibrated P(profitable). H1 budget: 30s (system design §2.2);
  // the Node caller wraps this in a circuit breaker (BE-068, timeout → HOLD).
  rpc RunPipeline(RunPipelineRequest) returns (RunPipelineResponse);

  // Vol-targeted position sizing (Kelly-capped) for a candidate.
  rpc SizePosition(SizePositionRequest) returns (SizePositionResponse);

  // Meta-model P(profitable) with calibration metadata.
  rpc Predict(PredictRequest) returns (PredictResponse);
}

// Matches the timeframe ladder in the DB schema (candles M1 base → D1 CAGGs).
enum Timeframe {
  TIMEFRAME_UNSPECIFIED = 0;
  TIMEFRAME_M1 = 1;
  TIMEFRAME_M5 = 2;
  TIMEFRAME_M15 = 3;
  TIMEFRAME_M30 = 4;
  TIMEFRAME_H1 = 5;
  TIMEFRAME_H4 = 6;
  TIMEFRAME_D1 = 7;
}

// Aligned with @fx/types TradeSide ("long" | "short").
enum TradeSide {
  TRADE_SIDE_UNSPECIFIED = 0;
  TRADE_SIDE_LONG = 1;
  TRADE_SIDE_SHORT = 2;
}

message RunPipelineRequest {
  string instrument = 1;                // OANDA naming, e.g. "EUR_USD"
  Timeframe timeframe = 2;
  google.protobuf.Timestamp bar_ts = 3; // close time of the bar (UTC)
}

message Candidate {
  string instrument = 1;
  TradeSide side = 2;
  double probability = 3;   // calibrated P(profitable), 0..1
  string regime = 4;        // HMM + liquidity regime label
  string model_version = 5;
}

message RunPipelineResponse {
  map<string, double> features = 1;
  // false → HOLD: the deterministic entry gate (ADR-010) skips agents entirely.
  bool has_candidate = 2;
  Candidate candidate = 3;
}

message SizePositionRequest {
  string instrument = 1;
  TradeSide side = 2;
  double probability = 3;      // calibrated P(profitable) from Predict/RunPipeline
  double account_equity = 4;   // account currency
  double entry_price = 5;
  double stop_loss_price = 6;
}

message SizePositionResponse {
  double units = 1;                  // position size in units (always > 0; side is explicit)
  double calibrated_probability = 2;
  double target_volatility = 3;      // annualised vol target used
  string sizing_model_version = 4;
}

message PredictRequest {
  string instrument = 1;
  Timeframe timeframe = 2;
  google.protobuf.Timestamp bar_ts = 3;
  map<string, double> features = 4;  // optional: precomputed features to score
}

message PredictResponse {
  double probability = 1;            // calibrated P(profitable), 0..1
  string calibration_method = 2;     // e.g. "isotonic"
  string model_version = 3;
  google.protobuf.Timestamp trained_at = 4;
}

// ─── BE-050…052 — ExecutionService (Step 2.2) ───────────────────────────────
// Node orchestrates; Python owns broker I/O via the QN-030 adapter seam.

service ExecutionService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CloseTrade(CloseTradeRequest) returns (CloseTradeResponse);
  rpc ModifyTrade(ModifyTradeRequest) returns (ModifyTradeResponse);
  rpc ListOpenPositions(ListOpenPositionsRequest) returns (ListOpenPositionsResponse);
  rpc GetTransactions(GetTransactionsRequest) returns (GetTransactionsResponse);
}

enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_FILLED = 1;
  EXECUTION_STATUS_PARTIAL = 2;
  EXECUTION_STATUS_REJECTED = 3;
}

message PlaceOrderRequest {
  string client_order_id = 1;
  string instrument = 2;
  TradeSide side = 3;
  double units = 4;
  optional double stop_loss_price = 5;
  optional double take_profit_price = 6;
}

message PlaceOrderResponse {
  ExecutionStatus status = 1;
  string broker = 2;
  optional string broker_order_id = 3;
  optional string broker_trade_id = 4;
  double requested_units = 5;
  double filled_units = 6;
  double remainder_units = 7;
  optional double fill_price = 8;
  optional string reason_code = 9;
}

message CloseTradeRequest {
  string broker_trade_id = 1;
  optional double units = 2; // omit / zero ⇒ full close
}

message CloseTradeResponse {
  ExecutionStatus status = 1;
  optional string broker_order_id = 2;
  double filled_units = 3;
  optional double fill_price = 4;
  optional string reason_code = 5;
}

message ModifyTradeRequest {
  string broker_trade_id = 1;
  optional double stop_loss_price = 2;
  optional double take_profit_price = 3;
}

message ModifyTradeResponse {
  ExecutionStatus status = 1;
  optional string reason_code = 2;
}

message ListOpenPositionsRequest {}

message BrokerPositionMsg {
  string instrument = 1;
  TradeSide side = 2;
  double units = 3;
  double avg_price = 4;
  double unrealized_pl = 5;
  repeated string broker_trade_ids = 6;
}

message ListOpenPositionsResponse {
  repeated BrokerPositionMsg positions = 1;
}

message GetTransactionsRequest {
  string since_txn_id = 1;
}

// Per-trade close/reduce detail inside an ORDER_FILL (OANDA TradeReduce).
// `trades_closed` = trades FULLY closed by the fill; `trade_reduced` = a trade
// PARTIALLY closed. Real ORDER_FILL transactions carry trade ids ONLY here —
// the reconciler must not rely on a top-level trade_id for fills.
message TradeReduceMsg {
  string trade_id = 1;
  double units = 2; // absolute units closed/reduced
  double price = 3;
  double realized_pl = 4;
  double financing = 5;
}

message BrokerTransactionMsg {
  string id = 1;
  string type = 2;
  string instrument = 3;
  optional string trade_id = 4; // top-level tradeID (SL/TP order txns — NOT fills)
  optional double units = 5;
  optional double price = 6;
  optional double pl = 7;
  optional double financing = 8;
  optional double commission = 9;
  string client_order_id = 10;
  google.protobuf.Timestamp time = 11;
  string reason = 12; // ORDER_FILL reason: MARKET_ORDER, STOP_LOSS_ORDER, …
  optional string trade_opened_id = 13; // ORDER_FILL tradeOpened.tradeID
  repeated TradeReduceMsg trades_closed = 14;
  optional TradeReduceMsg trade_reduced = 15;
}

message GetTransactionsResponse {
  repeated BrokerTransactionMsg transactions = 1;
  string last_txn_id = 2;
}
