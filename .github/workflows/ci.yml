# BE-005 — CI: Biome, tsc, Vitest, Docker builds on every PR;
# merge to main additionally publishes SHA-tagged images to GHCR.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate .env.example
        run: node scripts/check-env.mjs --ci

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test
        env:
          TRADING_MODE: paper

      - name: Build (turbo)
        run: pnpm build
        env:
          TRADING_MODE: paper

  # Step 1.5 (QN-001…005) — quant service: ruff + mypy + pytest, and the
  # codegen drift check (QN-003 contracts from @fx/types, QN-004 proto stubs).
  quant:
    name: Quant (ruff · mypy · pytest · codegen drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # @fx/types build emits the JSON Schemas the contracts codegen reads.
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @fx/types (emit JSON Schemas)
        run: pnpm --filter @fx/types build

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync quant deps (locked)
        working-directory: services/quant
        # --group vbt: linux wheels exist, so CI still exercises the real
        # vectorbt metrics backend (Intel-mac dev machines use the numpy
        # fallback — see pyproject [dependency-groups] vbt).
        run: uv sync --frozen --group vbt

      - name: Lint (ruff)
        working-directory: services/quant
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Typecheck (mypy strict)
        working-directory: services/quant
        run: uv run mypy

      - name: Codegen drift check (contracts + proto)
        working-directory: services/quant
        run: bash scripts/check_codegen.sh

      - name: Test (pytest)
        working-directory: services/quant
        run: uv run pytest
        env:
          TRADING_MODE: paper

  # BE-022 — migrations must apply cleanly to the same image prod runs, the
  # schema must match the migration history (drift check), destructive SQL
  # requires an explicit marker, and the Timescale layer + seeds must succeed.
  migrations:
    name: DB migrations (Prisma + TimescaleDB)
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb-ha:pg18-ts2.28
        env:
          POSTGRES_USER: fx
          POSTGRES_PASSWORD: fx_ci_password
          POSTGRES_DB: fx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fx -d fx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://fx:fx_ci_password@localhost:5432/fx
      CREDENTIALS_ENCRYPTION_KEY: ZGV2LW9ubHktY3JlZGVudGlhbHMta2V5LTMyYnl0ZXM=
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Destructive-migration guard
        run: node scripts/check-migrations.mjs

      - name: Apply migrations (prisma migrate deploy)
        run: pnpm db:deploy

      - name: Schema drift check (history ⇔ schema.prisma)
        run: pnpm --filter @fx/node-api exec prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel prisma/schema.prisma --exit-code

      - name: Apply TimescaleDB layer (hypertables/CAGGs/policies)
        run: pnpm db:timescale

      - name: Seed dev fixtures (BE-023)
        run: pnpm seed:dev

      - name: Re-apply TimescaleDB layer (idempotency) + refresh CAGGs
        run: pnpm db:timescale -- --refresh

  docker:
    name: Docker · ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: node-api
            dockerfile: apis/node-api/Dockerfile
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
          - name: quant
            dockerfile: services/quant/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fx-${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PRs: build only (proves the image). main: build + push :sha and :latest.
      - name: Build${{ github.ref == 'refs/heads/main' && ' & push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
