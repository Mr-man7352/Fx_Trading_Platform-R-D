# BE-141 — file-provisioned dashboards (JSON lives in ../../dashboards).
apiVersion: 1

providers:
  - name: fx-dashboards
    orgId: 1
    folder: FX Platform
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
