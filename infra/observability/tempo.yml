# BE-140 — single-binary Tempo for the local observability profile.
# Receives OTLP/HTTP on :4318 (node-api, worker, quant) and serves the Grafana
# Tempo datasource on :3200. Local retention only — prod sizing in README.md.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 168h # 7 days of local traces is plenty for dev
