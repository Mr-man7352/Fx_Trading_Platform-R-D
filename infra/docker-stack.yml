# BE-006 — Production stack for single-node Docker Swarm on Hetzner.
# Deploy:  TAG=<git-sha> DOMAIN=<domain> ./infra/deploy/deploy.sh   (see infra/DEPLOY.md)
#
# Zero-downtime: order=start-first boots the new task, waits for its
# healthcheck, then stops the old one; failure_action=rollback reverts
# automatically if the new task never turns healthy.
#
# ADR-006 rev.: PostgreSQL/TimescaleDB is NOT in this stack — it runs as a
# standalone container on a dedicated volume with its own lifecycle
# (infra/DEPLOY.md §3) and is reached via DATABASE_URL.

version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks: [proxy]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  web:
    image: ${REGISTRY:?set REGISTRY}/fx-dashboard:${TAG:?set TAG}
    environment:
      NODE_ENV: production
    networks: [proxy]
    deploy: &zero_downtime
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: start-first
      restart_policy:
        condition: any

  api:
    image: ${REGISTRY}/fx-node-api:${TAG}
    environment:
      NODE_ENV: production
      TRADING_MODE: ${TRADING_MODE:-paper}
      API_PORT: "4000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_COMMIT: ${TAG}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
      # BE-131 — `openssl rand -base64 32`; losing it orphans sealed credentials.
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?set CREDENTIALS_ENCRYPTION_KEY}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: redis://redis:6379
      QUANT_URL: http://quant:5001
      # BE-072 — kill-switch close-out goes over the execution gRPC channel.
      QUANT_GRPC_URL: quant:50051
    networks: [proxy, backend]
    deploy: *zero_downtime

  quant:
    image: ${REGISTRY}/fx-quant:${TAG}
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      QUANT_PORT: "5001"
      QUANT_GRPC_PORT: "50051"  # backend-network only; never published (QN-005)
      GIT_COMMIT: ${TAG}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks: [backend]
    deploy: *zero_downtime

  worker:
    # BE-040 — market-data worker (same image as api, different entrypoint).
    image: ${REGISTRY}/fx-node-api:${TAG}
    command: ["node", "dist/workers/main.js"]
    environment: &worker_env
      NODE_ENV: production
      TRADING_MODE: ${TRADING_MODE:-paper}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_COMMIT: ${TAG}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?set CREDENTIALS_ENCRYPTION_KEY}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: redis://redis:6379
    networks: [backend]
    deploy: *zero_downtime

  worker-execution:
    # BE-050/051/052 — execution worker: `execution` queue, 30s trade manager,
    # 60s reconciler, notifications. Quant gRPC over the backend network.
    image: ${REGISTRY}/fx-node-api:${TAG}
    command: ["node", "dist/workers/execution-main.js"]
    environment:
      <<: *worker_env
      QUANT_GRPC_URL: quant:50051
      RECONCILE_ACTION: ${RECONCILE_ACTION:-halt}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    networks: [backend]
    deploy: *zero_downtime

  worker-signals:
    # BE-066 — signals worker: `signals` queue → quant gRPC → entry gate
    # (ADR-010) → agent graph (BE-062) → risk gate → execution queue.
    image: ${REGISTRY}/fx-node-api:${TAG}
    command: ["node", "dist/workers/signals-main.js"]
    environment:
      <<: *worker_env
      QUANT_GRPC_URL: quant:50051
      QUANT_GRPC_PIPELINE_TIMEOUT_MS: ${QUANT_GRPC_PIPELINE_TIMEOUT_MS:-30000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_MONTHLY_COST_CAP_USD: ${LLM_MONTHLY_COST_CAP_USD:-200}
      AGENT_DEBATE_ROUNDS: ${AGENT_DEBATE_ROUNDS:-1}
      AGENT_MEMORY_ENABLED: ${AGENT_MEMORY_ENABLED:-true}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      RISK_PROBABILITY_THRESHOLD: ${RISK_PROBABILITY_THRESHOLD:-0.6}
      # BE-070/071 — deterministic risk-gate limits (Step 3.3; defaults = §10).
      RISK_MAX_CONCURRENT_TRADES: ${RISK_MAX_CONCURRENT_TRADES:-5}
      RISK_MAX_PER_CLUSTER: ${RISK_MAX_PER_CLUSTER:-2}
      RISK_CLUSTER_EXEMPTIONS: ${RISK_CLUSTER_EXEMPTIONS:-}
      RISK_DAILY_DD_HALT_PCT: ${RISK_DAILY_DD_HALT_PCT:-0.05}
      RISK_WEEKLY_DD_HALT_PCT: ${RISK_WEEKLY_DD_HALT_PCT:-0.10}
      RISK_INSTRUMENT_DAILY_LOSS_PCT: ${RISK_INSTRUMENT_DAILY_LOSS_PCT:-0.02}
      RISK_MIN_RR: ${RISK_MIN_RR:-1.8}
      RISK_WEEKEND_FLATTEN_ENABLED: ${RISK_WEEKEND_FLATTEN_ENABLED:-false}
      RISK_ROLLOVER_AUTOFLATTEN_XAU: ${RISK_ROLLOVER_AUTOFLATTEN_XAU:-false}
      ACCOUNT_BASELINE_EQUITY: ${ACCOUNT_BASELINE_EQUITY:-10000}
      SIGNALS_GRAPH_CONCURRENCY: ${SIGNALS_GRAPH_CONCURRENCY:-3}
      SIGNALS_GRAPH_BUDGET_MS: ${SIGNALS_GRAPH_BUDGET_MS:-120000}
      SIGNALS_E2E_BUDGET_MS: ${SIGNALS_E2E_BUDGET_MS:-180000}
    networks: [backend]
    deploy: *zero_downtime

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    networks: [backend]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

configs:
  caddyfile:
    file: ./Caddyfile

networks:
  proxy:
    driver: overlay
  backend:
    driver: overlay

volumes:
  caddy_data:
  caddy_config:
  redis_data:
