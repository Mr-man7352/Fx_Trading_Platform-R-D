# BE-006 — Production stack for single-node Docker Swarm on Hetzner.
# Deploy:  TAG=<git-sha> DOMAIN=<domain> ./infra/deploy/deploy.sh   (see infra/DEPLOY.md)
#
# Zero-downtime: order=start-first boots the new task, waits for its
# healthcheck, then stops the old one; failure_action=rollback reverts
# automatically if the new task never turns healthy.
#
# ADR-006 rev.: PostgreSQL/TimescaleDB is NOT in this stack — it runs as a
# standalone container on a dedicated volume with its own lifecycle
# (infra/DEPLOY.md §3) and is reached via DATABASE_URL.

version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks: [proxy]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  web:
    image: ${REGISTRY:?set REGISTRY}/fx-dashboard:${TAG:?set TAG}
    environment:
      NODE_ENV: production
    networks: [proxy]
    deploy: &zero_downtime
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: start-first
      restart_policy:
        condition: any

  api:
    image: ${REGISTRY}/fx-node-api:${TAG}
    environment:
      NODE_ENV: production
      TRADING_MODE: ${TRADING_MODE:-paper}
      API_PORT: "4000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_COMMIT: ${TAG}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: redis://redis:6379
      QUANT_URL: http://quant:5000
    networks: [proxy, backend]
    deploy: *zero_downtime

  quant:
    image: ${REGISTRY}/fx-quant:${TAG}
    environment:
      QUANT_PORT: "5000"
      GIT_COMMIT: ${TAG}
    networks: [backend]
    deploy: *zero_downtime

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    networks: [backend]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

configs:
  caddyfile:
    file: ./Caddyfile

networks:
  proxy:
    driver: overlay
  backend:
    driver: overlay

volumes:
  caddy_data:
  caddy_config:
  redis_data:
