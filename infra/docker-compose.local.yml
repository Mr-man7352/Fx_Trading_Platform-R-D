# BE-004 — Local dev stack: PG18+TimescaleDB+pgvector, Redis 8, quant, api, web.
# Run from repo root:  docker compose -f infra/docker-compose.local.yml up -d --build
# (or `pnpm stack:up`). All services expose healthchecks; `docker compose ps`
# must show every service healthy.
#
# Production note (BE-004 AC #3): in prod the database is the SAME image
# (timescale/timescaledb-ha:pg18) but runs on a dedicated Hetzner volume with
# its own container lifecycle, OUTSIDE the Swarm application stack — see
# infra/DEPLOY.md and ADR-006 rev. Dev and prod use the identical image.

name: fx-local

services:
  db:
    # -ha image = community TimescaleDB (CAGGs, compression, retention) + pgvector.
    image: timescale/timescaledb-ha:pg18-ts2.28
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fx_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-fx}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fx} -d ${POSTGRES_DB:-fx}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:8-alpine
    # AOF everysec — BullMQ durability + cache correctness depend on it (NFR §7).
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  quant:
    # QN-001/QN-005 — FastAPI :5001 + gRPC :50051. Service name + /healthz
    # unchanged from Step 1.2; HTTP port moved 5000 → 5001 (macOS AirPlay).
    build:
      context: ..
      dockerfile: services/quant/Dockerfile
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      QUANT_PORT: "5001"
      QUANT_GRPC_PORT: "50051"
      GIT_COMMIT: ${GIT_COMMIT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # BE-140 — empty ⇒ tracing off. In-network Tempo (observability profile).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "127.0.0.1:5001:5001"
      # gRPC — published for local debugging (grpcurl); workers use the
      # service name in-network (Phase 2, BE-068).
      - "127.0.0.1:50051:50051"

  api:
    build:
      context: ..
      dockerfile: apis/node-api/Dockerfile
    environment:
      NODE_ENV: production
      TRADING_MODE: ${TRADING_MODE:-paper}
      API_PORT: "4000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      # BE-013 — Phase-1 auth stand-in (dev default matches .env.example).
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # BE-131 — dev-only default (base64 of 32 bytes); NEVER reuse in prod.
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-ZGV2LW9ubHktY3JlZGVudGlhbHMta2V5LTMyYnl0ZXM=}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fx}:${POSTGRES_PASSWORD:-fx_dev_password}@db:5432/${POSTGRES_DB:-fx}
      REDIS_URL: redis://redis:6379
      QUANT_URL: http://quant:5001
      # BE-140 — empty ⇒ tracing off. In-network Tempo (observability profile).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      quant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    # BE-040 — market-data worker: consumes ticks from the `market-ticks` queue,
    # aggregates M1 candles into TimescaleDB, enqueues a `signals` job per H1
    # close. Same image as `api`; only the command differs (dist/workers/main.js
    # is built alongside the server — see apis/node-api build script).
    build:
      context: ..
      dockerfile: apis/node-api/Dockerfile
    command: ["node", "dist/workers/main.js"]
    environment:
      NODE_ENV: production
      TRADING_MODE: ${TRADING_MODE:-paper}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token-change-me}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-ZGV2LW9ubHktY3JlZGVudGlhbHMta2V5LTMyYnl0ZXM=}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fx}:${POSTGRES_PASSWORD:-fx_dev_password}@db:5432/${POSTGRES_DB:-fx}
      REDIS_URL: redis://redis:6379
      # BE-140 — empty ⇒ tracing off. In-network Tempo (observability profile).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-execution:
    # BE-050/051/052 — execution worker process: `execution` queue, 30s trade
    # manager, 60s reconciler, notifications. Same image as `api`; only the
    # command differs (dist/workers/execution-main.js is built alongside the
    # server — see apis/node-api build script). Talks to quant gRPC in-network.
    build:
      context: ..
      dockerfile: apis/node-api/Dockerfile
    command: ["node", "dist/workers/execution-main.js"]
    environment:
      NODE_ENV: production
      TRADING_MODE: ${TRADING_MODE:-paper}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token-change-me}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-ZGV2LW9ubHktY3JlZGVudGlhbHMta2V5LTMyYnl0ZXM=}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fx}:${POSTGRES_PASSWORD:-fx_dev_password}@db:5432/${POSTGRES_DB:-fx}
      REDIS_URL: redis://redis:6379
      QUANT_GRPC_URL: quant:50051
      RECONCILE_ACTION: ${RECONCILE_ACTION:-halt}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # BE-140 — empty ⇒ tracing off. In-network Tempo (observability profile).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      quant:
        condition: service_started

  # QN-020 — OANDA price stream → `market-ticks`. Opt-in (needs OANDA creds):
  #   docker compose -f infra/docker-compose.local.yml --profile ingest up -d quant-stream
  quant-stream:
    profiles: ["ingest"]
    build:
      context: ..
      dockerfile: services/quant/Dockerfile
    command: ["python", "-m", "app.market", "stream"]
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: redis://redis:6379
      OANDA_API_TOKEN: ${OANDA_API_TOKEN:-}
      OANDA_ACCOUNT_ID: ${OANDA_ACCOUNT_ID:-}
      OANDA_ENVIRONMENT: ${OANDA_ENVIRONMENT:-practice}
      MARKET_INSTRUMENTS: ${MARKET_INSTRUMENTS:-EUR_USD,GBP_USD,USD_JPY,XAU_USD}
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # Dev-only log viewer — real-time streaming/search of all containers in a
  # browser at http://localhost:8888. Reads the Docker socket read-only; runs
  # no agents. Opt-in via profile so it never starts with the plain stack:
  #   docker compose -f infra/docker-compose.local.yml --profile debug up -d dozzle
  # (or just `pnpm debug`, which enables the profile for you).
  dozzle:
    profiles: ["debug"]
    image: amir20/dozzle:latest
    environment:
      DOZZLE_FILTER: "name=fx-local-*"
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── BE-140/141 — observability profile: Tempo (traces), Prometheus (metrics),
  # Grafana (dashboards + alerting). Opt-in:
  #   docker compose -f infra/docker-compose.local.yml --profile observability up -d
  # then set OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318 (compose) /
  # http://localhost:4318 (bare `pnpm dev`) and restart api/worker/quant.
  # Grafana: http://localhost:3001 (admin / ${GRAFANA_ADMIN_PASSWORD:-admin}).
  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:4318:4318" # OTLP/HTTP ingest (host-side apps)
      - "127.0.0.1:3200:3200" # Tempo query API (Grafana datasource)

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.4.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.0.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # BE-141 — Telegram/SMS contact-point secrets (blank ⇒ alerts stay in UI).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMS_WEBHOOK_URL: ${SMS_WEBHOOK_URL:-}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - tempo
      - prometheus

volumes:
  db_data:
  redis_data:
  tempo_data:
  prom_data:
  grafana_data:
